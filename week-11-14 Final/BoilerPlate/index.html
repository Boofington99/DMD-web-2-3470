<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>My App Website</title>
  <meta name="description" content="Modern app landing page">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <header class="nav">
    <div class="nav-container">
      <img src="img/logo.png" alt="Logo">

      <nav>
        <a href="#home">Home</a>
        <a href="#features">Features</a>
        <a href="#work">How it works</a>
        <a href="#plan">Pricing</a>
        <a href="#reviews">Review</a>
      </nav>
    </div>
  </header>

  <!-- HERO / HEADER -->
  <section id="home" class="container2">
    <div class="hero-text">
      <p>Jupiter X Lite</p>
      <h1>Awesome App For</h1>
      <h1>Your Modern <span class="accent-text">Lifestyle</span></h1>
    </div>

    <div class="hero-btn">
      <button>Get Started</button>
    </div>

    <div class="hero-img">
      <img src="img/app.png" alt="App Preview">
    </div>
  </section>

  <!-- FEATURES -->
  <section id="features">
    <h2>Awesome App Features</h2>
  </section>

  <!-- HOW IT WORKS -->
  <section id="work">
    <h2>How Does This App Work?</h2>
  </section>

  <!-- PRICING -->
  <section id="plan">
    <h2>Choose Your Plan</h2>
  </section>

  <!-- REVIEWS -->
  <section id="reviews">
    <h2>User Reviews</h2>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 My App. All rights reserved.</p>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
